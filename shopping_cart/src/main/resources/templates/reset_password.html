<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="~{base::layout(~{::section})} ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="container mt-5 p-5">
            <div class="row">
            <div class="col md-6 p-5">
                <img src="img/ecom3.jpg" alt="" width="100%" height="400px">
            </div>
            <div class="col md-6 mt-1 p-5">
                <div class="card shadow-lg p-3 mb-5 bg-body-tertiary rounded">
                    <div class="card-header">
                        <p class="fs-4 text-center fw-bold text-primary">Set New Password</p>
                        
                    </div>
                    <div class="card-body">
                        <form action="/reset-password" method="post">
                            <input type="hidden" name="resetToken" th:value="${resetToken}">
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input class="form-control" name="password" type="password" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ConfirmPassword</label>
                                <input class="form-control" name="confirmPassword" type="password" />
                            </div>
                            <button type="submit" class="btn bg-primary text-white col-md-12">Confirm</button>
                        </form>
                    </div>
                   
                </div>
            </div>
            </div>
        </div>
    </section>
</body>
</html>
