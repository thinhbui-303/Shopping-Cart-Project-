<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="~{base::layout(~{::section})} ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="container  p-5 mt-5 ">
            <div class="row">
                <div class="col-md-8 offset-md-2 ">
                     <div class="card card-sh">
                        <div class="card-header text-center fs-4">
                            <p class="fs-4">Edit Product</p>
                            <th:block>
                                <p class="text-success fw-bold" th:if="${session.successMsg}">[[${session.successMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>
                            <th:block>
                                <p class="text-danger fw-bold" th:if="${session.errorMsg}">[[${session.errorMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>
                        </div>
                        <div class="card-body">
                            <form action="/admin/updateProduct" method="post" enctype="multipart/form-data" >
                            <input type="hidden" name="id" th:value="${product.id}">
                            <div class="mb-3">
                                
                                    <label>Enter Title:</label>
                                    <input type="text" name="title" id="title" class="form-control" th:value="${product.title}">
                                
                            </div>
                            <div class="mb-3">
                                
                                    <label>Enter Description:</label>
                                    <textarea name="description" rows="3" id="" class="form-control">[[${product.description}]]</textarea>
                            </div>
                           <div class="row">
                             <div class="mb-3 col-md-6">
                                
                                    <label>Category:</label>
                                    <select class="form-control" name="category" th:value="${product.category}"> 
                                        <option  th:each="cate:${categories}" >[[${cate.name}]]</option>
                                       
                                    </select>
                                
                            </div>
                            <div class="mb-3 col-md-6">
                                
                                    <label>Enter Price:</label>
                                    <input type="number" name="price" id="Price" class="form-control" th:value="${product.price}">
                            
                            </div>
                           </div>
                            <div class="row">
                             <div class="mb-3 col-md-6">
                                
                                    <label>Enter Discount:</label>
                                    <input type="number" name="discount" id="Price" class="form-control" th:value="${product.discount}">
                                
                            </div>
                            <div class="mb-3 col-md-6">
                                
                                    <label>DiscountPrice:</label>
                                    <input type="number" name="discountPrice" id="discountPrice" class="form-control" th:value="${product.discountPrice} " readonly>
                            
                            </div>
                           </div>
                           <div class="mb-3">
                                    <label>Status:</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault1"  value="true" th:checked="${product.isActive == true}">
                                        <label class="form-check-label" for="radioDefault1">
                                            Active
                                        </label>
                                        </div>
                                        <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault2" value="false" th:checked="${product.isActive == false}">
                                        <label class="form-check-label" for="radioDefault2">
                                             Inactive
                                        </label>
                                        </div>
                                </div>
                            <div class="row">
                                <div class="col-md-6">
                                     
                                    <label>Stock:</label>
                                    <input type="number" name="stock" class="form-control" th:value="${product.stock}">
                                
                                </div>
                                <div class="col-md-6">
                                     
                                    <label>Image:</label>
                                    <input type="file" class="form-control" name="file">
                                
                                </div>

                            </div>
                            
                            <div class="mt-5" ><img th:src="@{'/img/products_img/'+ ${product.image}}" width="80px" height="80px"></div>
                            <button class="text-center btn btn-primary col-md-12 mt-3 ">Update</button>
                            </form>
                        </div>
                  </div>
                </div>
            </div>
           
        </div>
    </section>
</body>
</html>
