<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})} ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="container-fluid p-5 mt-5">
            <div class="row">
                <div class="col-md-4">
                    <div class="card card-sh">

                        <div class="card-header text-center fw-bold">
                            <P class="fs-4">Category Add</P>
                            <th:block th:if="${session.successMsg}">
                                <p class="text-success fw-bold">[[${session.successMsg}]]</p>
                                <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>

                            <th:block th:if="${session.errorMsg}">
                                <p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
                                <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>
                        </div>
                        <div class="card-body">
                            <form action="/admin/saveCategory" method="post" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <label>Enter Category:</label>
                                    <input type="text" class="form-control" name="name">
                                </div>
                                <div class="mb-3">
                                    <label>Status:</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault1"
                                            checked value="true">
                                        <label class="form-check-label" for="radioDefault1">
                                            Active
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault2"
                                            value="false">
                                        <label class="form-check-label" for="radioDefault2">
                                            Inactive
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label>Image:</label>
                                    <input type="file" class="form-control" name="file">
                                </div>
                                <button class="col-md-12 btn btn-primary">Save</button>
                        </div>

                        </form>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card card-sh">
                        <div class="card-header text-center fw-bold">Category Details</div>
                        <div class="card-body text-center">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th scope="col">SL No</th>
                                        <th scope="col">Category</th>
                                        <th scope="col">Status</th>
                                        <th scope="col">Image</th>
                                        <th scope="col">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cate,c:${categories}">
                                        <th scope="row">[[${c.count}]]</th>
                                        <td>[[${cate.name}]]</td>
                                        <td>
                                            <p th:if="${cate.isActive == false}" class="text-warning fw-bold"> Inactive
                                            </p>
                                            <p th:if="${cate.isActive == true}" class="text-success fw-bold"> Active</p>
                                        </td>
                                        <td><img th:src="@{'/img/categories_img/'+ ${cate.imageName}}" width="75px"
                                                height="75px"></td>
                                        <td>
                                            <a th:href="@{/admin/loadEditCategory/} + ${cate.id}"
                                                class="btn btn-primary btn-sm"><i
                                                    class="fa-solid fa-pen-to-square text-warning"></i>Edit</a>
                                            <a th:href="@{/admin/deleteCategory/} + ${cate.id}"
                                                class="btn btn-primary btn-sm"><i
                                                    class="fa-solid fa-trash text-danger"></i>Delete</a>
                                        </td>
                                    </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="row mt-2 ">
                        <div class="col-md-4 ">
                            <p class="fw-bold">Total Categories:[[${totalCategories}]]</p>
                        </div>
                        <th:block th:if="${categories.size() > 0 && totalPages > 1}">
                            <div class="col-md-8">
                                <nav aria-label="Page navigation example">
                                    <ul class="pagination ">
                                        <li class="page-item" th:classappend=" ${isFirst}? 'disabled' : '' "><a
                                                class="page-link" th:href="@{'/admin/category?pageNo=' + ${pageNo - 1}}">
                                                <span aria-hidden="true">&laquo;</span>
                                            </a></li>

                                        <li class="page-item" th:each="i : ${#numbers.sequence(1,totalPages-1)}"
                                            th:classappend="${pageNo == i}?'active':''"><a class="page-link"
                                                th:href="@{'/admin/category?pageNo=' + ${i}}">[[${i}]]</a></li>


                                        <li class="page-item" th:classappend="${isLast}? 'disabled':''"><a
                                                class="page-link" th:href="@{'/admin/category?pageNo=' + ${pageNo + 1}}"><span
                                                    aria-hidden="true">&raquo;</span></a></li>
                                    </ul>
                                </nav>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
