<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})} ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <!-- start slider -->
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/ecom.jpg" class="d-block w-100" alt="..." height="350px">
                </div>
                <div class="carousel-item">
                    <img src="img/ecom1.jpg" class="d-block w-100" alt="..." height="350px">
                </div>
                <div class="carousel-item">
                    <img src="img/ecom2.jpg" class="d-block w-100" alt="..." height="350px">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        <!-- end slider -->
        <!-- start categories modules -->
        <div class="container">
            <div class="row">
                <p class="text-center fs-4 fw-bold">Categories</p>
                <div class="col-md-2" th:each="c:${cates}">
                    <div class="cart rounded-circle shadow-sm p-3 mb-5 bg-body-tertiary rounded">
                        <div class="cart-body text-center">
                            <img th:src="@{'img/categories_img/'+ ${c.imageName}}" alt="" width="65%" height="140px">
                            <p><a  th:href="@{'/products?category=' + ${c.name}}" class="text-decoration-none">[[${c.name}]]</a></p>
                        </div>
                    </div>
                </div>

            </div>

        </div>
        <!-- end category modules -->
        <!-- start lastest product modules -->
        <div class="container-fluid bg-light p-3">
            <div class="row">
                <p class="text-center fs-4 fw-bold">Lastest Products</p>
                <div class="col-md-3" th:each="p:${products}">
                    <div class="card shadow-sm p-3 mb-5 bg-body-tertiary rounded">
                        <div class="card-body text-center">
                            <img th:src="@{'img/products_img/' + ${p.image}}" alt="" width="65%" height="140px">
                            <p class="text-center"><a th:href="@{'/product/' + ${p.id}}" class="text-decoration-none">[[${p.title}]]</a></p>
                        </div>
                    </div>
                </div>


            </div>
        </div>
        <!-- end lastest product modules -->
    </section>
</body>

</html>
