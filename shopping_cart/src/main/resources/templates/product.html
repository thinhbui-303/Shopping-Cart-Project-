<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})} ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="container-fluid bg-primary p-5 mt-2">
            <div class="row">
                <div class="col-md-8 offset-md-2 ">
                    <form action="/products" method="get">
                        <div class="input-group">
                            <input type="text" class="form-control" name="ch">
                            <button class="btn btn-light text-dark ms-2 col-md-2"><i
                                    class="fa-brands fa-searchengin"></i>Search</button>

                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="container-fluid mt-1">
            <div class="row">
                <div class="col-md-2 ">

                    <div class="list-group">
                        <p class="fs-4">Categories</p>
                        <a href="#" th:classappend="${paramValue==''}?'active':''"
                            class="list-group-item list-group-item-action" aria-current="true">All</a>

                        <a class="list-group-item list-group-item-action" th:each="cate:${categories}"
                            th:href="@{'/products?category=' + ${cate.name}}"
                            th:classappend="${paramValue==cate.name}?'active':''">[[${cate.name}]]</a>

                    </div>
                </div>
                <div class="col-md-10 ">
                    <div class="card">
                        <div class="card-body">
                            <p class="fs-3 text-center">Products</p>
                        </div>

                        <th:block th:if="${products.size()>0}">
                            <div class="row">
                                <div class="col-md-3" th:each="p:${products}">
                                    <div class="card ">
                                        <div class="card-body">
                                            <img th:src="@{'/img/products_img/' + ${p.image}}" width="100%"
                                                height="150px" class="card-sh">
                                            <p class="fs-5 text-center">[[${p.title}]]</p>
                                            <div class="row text-center">
                                                <span class="fs-6 fw-bold ">[[${p.discountPrice}]]$</span>
                                                <span>
                                                    <span
                                                        class="fs-8 text-decoration-line-through fw-bold text-secondary">[[${p.price}]]$</span>
                                                    <span class="fs-6 text-success fw-bold">[[${p.discount}]]%
                                                        off</span>
                                                </span>
                                                <a th:href="@{'/product/' + ${p.id}}"
                                                    class="btn btn-primary col-md-6 offset-md-3">View Details</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </th:block>


                        <th:block th:unless="${products.size()>0}">
                            <p class="fs-4 text-danger text-center">Products are unavailable</p>
                        </th:block>

                    </div>
                    <div class="row mt-2 ">
                    <div class="col-md-4 "><p class="fw-bold">Total Product:[[${totalProducts}]]</p></div>
                    <th:block th:if="${products.size() > 0 && totalPages > 1}">
                        <div class="col-md-8">
                            <nav aria-label="Page navigation example">
                                <ul class="pagination ">
                                    <li class="page-item" th:classappend=" ${isFirst}? 'disabled' : '' "><a
                                            class="page-link" th:href="@{'/products?pageNo=' + ${pageNo - 1} + '&ch=' + ${ch}}"> <span
                                                aria-hidden="true">&laquo;</span>
                                        </a></li>

                                    <li class="page-item" th:each="i : ${#numbers.sequence(1,totalPages-1)}"
                                        th:classappend="${pageNo == i}?'active':''"><a class="page-link"
                                            th:href="@{'/products?pageNo=' + ${i} + '&ch=' + ${ch}}">[[${i}]]</a></li>


                                    <li class="page-item" th:classappend="${isLast}? 'disabled':''"><a class="page-link"
                                            th:href="@{'/products?pageNo=' + ${pageNo + 1} + '&ch=' + ${ch}}"><span
                                                aria-hidden="true">&raquo;</span></a></li>
                                </ul>
                            </nav>
                        </div>
                    </th:block>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
